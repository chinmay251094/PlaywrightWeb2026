# ═══════════════════════════════════════════════════════════════════
# QA ENVIRONMENT CONFIGURATION  (qa.properties)
# Overrides values in config.properties for the QA environment.
# Activated by: -Denv=qa  or  mvn test -P qa
# ═══════════════════════════════════════════════════════════════════

# ─── Application URL ─────────────────────────────────────────────────
base.url=https://askomdch.com

# ─── Test user credentials (QA account) ─────────────────────────────
# IMPORTANT: Replace with a real QA test account before executing.
# Never commit production credentials to source control.
test.user.username=demouser
test.user.password=demopass123

# ─── API base (for future API utility use) ───────────────────────────
api.base.url=https://askomdch.com/wp-json/wc/v3

# ─── Browser for QA — headed locally for easier debugging ────────────
headless=false
browser=chromium
