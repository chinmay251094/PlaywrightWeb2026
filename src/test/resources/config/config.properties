# ═══════════════════════════════════════════════════════════════════
# BASE CONFIGURATION  (config.properties)
# Environment-specific files (qa/uat/prod.properties) override these.
# JVM -D flags override everything at runtime.
# ═══════════════════════════════════════════════════════════════════

# ─── Active environment ─────────────────────────────────────────────
env=qa

# ─── Browser defaults ────────────────────────────────────────────────
# Values: chromium | firefox | webkit
browser=chromium
headless=true

# ─── Viewport ────────────────────────────────────────────────────────
viewport.width=1920
viewport.height=1080

# ─── Browser locale & timezone ──────────────────────────────────────
browser.locale=en-US
browser.timezone=America/New_York

# ─── Timeouts (ms) ───────────────────────────────────────────────────
default.timeout=30000
page.load.timeout=60000
explicit.wait=15000

# ─── Retry ────────────────────────────────────────────────────────────
max.retry.count=2

# ─── Tracing / video recording ───────────────────────────────────────
# Set to true to capture Playwright trace files for debugging
trace.enabled=false
